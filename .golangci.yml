version: "2"

linters:
  # pkg/goldmark/ is the vendored goldmark@v1.8.2 fork. As a nested
  # module it was never linted by this config; keep that status quo
  # now that it is part of the main module (so `go install m@version`
  # works) — upstream code predates these linters and grading it
  # would drown real findings.
  exclusions:
    paths:
      - pkg/goldmark
  enable:
    - errcheck
    - funlen
    - gocognit
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - lll
    - prealloc
    - revive
  settings:
    lll:
      line-length: 120
      tab-width: 4
    funlen:
      lines: 60
      statements: 40
    gocognit:
      min-complexity: 30
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: blank-imports

formatters:
  enable:
    - gofmt
    - goimports
