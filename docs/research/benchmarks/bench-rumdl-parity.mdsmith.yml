# Head-to-head benchmark profile: mdsmith configured to run the same
# rule set rumdl runs by default (42 rules), so a benchmark of
# mdsmith against rumdl measures the same per-file work, not a
# different rule count.
#
# Selects the built-in `rumdl-parity` convention
# (internal/convention/convention.go), which is the single source of
# truth for the rule set — this file only selects it, so the two can
# never drift. rumdl runs the full markdownlint-compatible rule set.
#
# internal/integration verifies rumdl-parity against the per-rule
# rumdl mappings in the rule README front matter, so the set stays
# equal to rumdl's default-on rules.
front-matter: true
convention: rumdl-parity
