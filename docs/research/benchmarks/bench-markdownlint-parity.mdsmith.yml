# Head-to-head benchmark profile: mdsmith configured to run the same
# rule set markdownlint runs by default (42 rules), so a benchmark of
# mdsmith against markdownlint measures the same per-file work, not a
# different rule count.
#
# Selects the built-in `markdownlint-parity` convention
# (internal/convention/convention.go), which is the single source of
# truth for the rule set — this file only selects it, so the two can
# never drift. markdownlint-cli2 runs the full markdownlint rule set.
#
# internal/integration verifies markdownlint-parity against the per-rule
# markdownlint mappings in the rule README front matter, so the set stays
# equal to markdownlint's default-on rules.
front-matter: true
convention: markdownlint-parity
