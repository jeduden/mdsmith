name: cuelite-fuzz

# Engine smoke fuzzing for the in-house CUE-subset engine (plan 218).
# Plan 240 deleted the differential oracle with the cuelang.org
# dependency, so these fuzzers hunt panics, hangs, and silent
# acceptance of garbage in the parser and evaluators — not divergence.
# The regression layer (every divergence found while the oracle
# existed, pinned as f.Add seeds and corpus tests) runs in the
# ordinary `test` job on every push.

on:
  pull_request:
    paths:
      - "cue/cuelite/**"
      - ".github/workflows/cuelite-fuzz.yml"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzSchemaSmoke, FuzzRowSmoke, FuzzPathSmoke]
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - name: Fuzz ${{ matrix.target }} for panic and hang safety
        run: go test -run='^$' -fuzz='${{ matrix.target }}$' -fuzztime=240s ./cue/cuelite/
      # A failing fuzz run writes the minimized input under testdata/fuzz/.
      # Upload it so the find survives the ephemeral runner and can be
      # committed as a regression seed.
      - name: Upload minimized crashers
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crashers-${{ matrix.target }}
          path: cue/cuelite/testdata/fuzz/
          if-no-files-found: ignore
