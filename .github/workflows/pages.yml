name: Deploy mdsmith.dev

# The website deploy is independent of the tool release. A docs or
# website change on main ships the site with no tool release and no
# `release`-environment approval. A maintainer can also ship the
# site on demand via the Actions "Run workflow" UI
# (workflow_dispatch), optionally stamping a specific version. A
# tool release also ships the site by calling this workflow (see
# release.yml's `pages` job, which gates on the frozen release),
# passing the release version so the published site shows it. The
# site is pure HTML built from docs/**/*.md and the homepage data
# files, so it never needs the registry-publish credentials.
#
# The `build-content` job runs on push to main AND on every
# pull_request that touches the same paths. It lints the synced
# tree, then renders the site with Hugo and runs the rendered-HTML
# probes (verify-website-links), so a broken-link OR render-link
# regression fails the PR rather than only surfacing after merge.
# The `deploy` job is gated to main, so PR runs stop before publish.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      # build-website also publishes the rule directory index and
      # each rule's README as per-rule pages, so changes to any of
      # those files must redeploy the site too.
      - "internal/rules/index.md"
      - "internal/rules/MDS*/**"
      # The link-rewrite and sync logic that generates the
      # site lives under cmd/mdsmith-release and
      # internal/release. A regression in those packages
      # would corrupt the published tree silently if the
      # workflow only ran on docs/website edits, so trigger
      # the deploy (which runs the synced-tree lint) on any
      # change to the generator too.
      - "cmd/mdsmith-release/**"
      - "internal/release/**"
      - ".github/workflows/pages.yml"
  # Run the synced-tree lint on every PR that touches a path that
  # could break it. The deploy job is main-only (see its `if:`
  # guard) so PRs stop at the lint and never publish.
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "internal/rules/index.md"
      - "internal/rules/MDS*/**"
      - "cmd/mdsmith-release/**"
      - "internal/release/**"
      - ".github/workflows/pages.yml"
  # Manual trigger from the Actions "Run workflow" UI. The optional
  # version input is read through the same `inputs.version` context
  # as workflow_call (the "Resolve site version" step below), so a
  # blank input falls back to the latest v* tag.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp into the site (defaults to the latest v* tag)"
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to stamp into the site (defaults to the latest v* tag)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  mdsmith-check:
    uses: ./.github/workflows/mdsmith-check.yml

  build-content:
    # Build the Hugo content tree from docs/, run `mdsmith check`
    # against it with the build-output config (link integrity on,
    # style rules off), then render the site with Hugo and probe the
    # rendered HTML (verify-website-links). Catches both broken-link
    # and render-link regressions on PR rather than only on the
    # post-merge deploy. deploy `needs: build-content`, so push /
    # workflow_dispatch / workflow_call runs all gate on this job
    # before publishing.
    #
    # deploy re-runs the same sync and lint after the
    # version-stamp + site-assets pulls (which mutate docs/
    # before the second sync), so the deploy's second pass
    # also covers anything those steps could break — work that
    # build-content deliberately skips on PR.
    #
    # No Pages permissions — this job never touches the Pages
    # API; deploy carries those separately.
    name: Build and lint website content tree
    needs: mdsmith-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Render the site with the same Hugo the deploy uses so the
      # rendered-HTML probes below run on PR, not only post-merge.
      HUGO_VERSION: "0.161.1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build Hugo content tree from docs
        # Snapshot ./docs into ./website/content/docs with the
        # docs→Hugo transforms (proto.md drop, index.md →
        # _index.md rename, link rewrites, shortcode escape).
        # --no-fix because docs/ is already lint-clean on main
        # (the check workflow gates that) and PRs must not have
        # CI mutate the tree.
        run: go run ./cmd/mdsmith-release build-website --no-fix ./docs ./website/content/docs
      - name: Lint built docs tree for broken links
        # The cross-file-reference-integrity rule (MDS027) runs
        # over the synced tree so any post-sync broken link or
        # missing anchor fails CI before merge. --no-gitignore
        # is needed because website/content/docs/ is
        # .gitignore'd. See website/build-output.mdsmith.yml
        # for the rule set and the rationale for each disabled
        # rule.
        run: |
          go run ./cmd/mdsmith check \
            --config ./website/build-output.mdsmith.yml \
            --no-gitignore \
            ./website/content/docs
      - name: Install Hugo
        # `go install` resolves via the Go module proxy with sumdb
        # checksum verification, so the binary is pinned by content
        # hash even though the version selector is a tag.
        run: go install github.com/gohugoio/hugo@v${HUGO_VERSION}
      - name: Render site
        # Render the synced tree so the steps below can probe the
        # real rendered HTML. The synced-tree lint above operates on
        # the markdown filesystem (pre-render) and cannot see the
        # render-link hook output, which is exactly what broke the
        # deploy after the maintainer-doc prune: a probe pinned to a
        # now-unpublished page. Root baseURL — the production deploy
        # is served from the domain root, so relURL emits root paths.
        working-directory: website
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify --baseURL "/"
      - name: Verify render-link hook output
        # Probe the rendered HTML for the render-link behaviors
        # (.md → permalink, site-absolute /rules/ hrefs, no leaked
        # README.md / javascript: / data: targets). The probes live
        # in internal/release/verifylinks.go with unit-test coverage.
        # The deploy job runs the same check, but only on main; this
        # PR-time copy fails a regression before merge.
        run: |
          go run ./cmd/mdsmith-release verify-website-links \
            --dir ./website/public --base-url ""
      - name: Verify install picker matches channel docs
        # Probe the rendered homepage so a Hugo-template regression
        # in install-picker.html — a dropped data-cmd-windows, a
        # missing <noscript> fallback, a renamed attribute — fails
        # the PR. The channels.yaml round-trip test in
        # internal/release covers only the Go<->YAML layer, not the
        # template; this closes that gap against the real render.
        run: |
          go run ./cmd/mdsmith-release verify-install-picker \
            --dir ./website/public
      - name: Verify baseURL prefix on absolute hrefs
        # Re-render with a fake subpath baseURL and re-probe, so a
        # render-link regression in the relURL prefixing (which a
        # root-baseURL render cannot exercise) also fails the PR.
        working-directory: website
        run: |
          hugo --minify --baseURL "https://example.com/mdsmith/" \
            --destination /tmp/baseurl-probe
          cd ..
          go run ./cmd/mdsmith-release verify-website-links \
            --dir /tmp/baseurl-probe \
            --base-url "https://example.com/mdsmith/"

  deploy:
    name: Deploy mdsmith.dev to GitHub Pages
    needs: build-content
    # Guard fork clones and stray refs: only the canonical repo
    # deploys, and only from `main`. workflow_dispatch lets a
    # maintainer select any branch in the Run-workflow UI; without
    # the ref check a manual run from a feature branch would publish
    # that branch's content to production. push is already main-only
    # and the release-driven workflow_call runs from `main` (the
    # `release` environment restricts release dispatches to it).
    # pull_request runs are silently skipped here so the lint job
    # above is the only thing the PR sees.
    if: github.repository == 'jeduden/mdsmith' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize deploys so two runs cannot race the Pages API.
    # cancel-in-progress: false because a half-applied Pages
    # publish would leave the live site inconsistent. Scoped to
    # this job (not the whole workflow) so PR runs of
    # build-content, which never touch the Pages API, don't queue
    # behind an in-flight deploy or behind each other.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Pin the Hugo version used by the deploy. The same pin
      # appears in the local dev instructions in website/README.md;
      # bump both together so a local preview cannot drift from CI.
      # (mdsmith-release build-website does not install Hugo — it
      # expects the binary already on PATH — so no pin lives there.)
      HUGO_VERSION: "0.161.1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Full history + tags so the version resolver below can
          # fall back to the latest v* tag on a docs-only push.
          fetch-depth: 0
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          # Match the release path: the GitHub Actions tool cache is
          # a mutation surface zizmor flags in id-token workflows.
          cache: false
      - name: Install Hugo
        # `go install` resolves via the Go module proxy with sumdb
        # checksum verification, so the binary is pinned by content
        # hash even though the version selector is a tag.
        run: go install github.com/gohugoio/hugo@v${HUGO_VERSION}
      - name: Resolve site version
        # A tool release passes the release version. A docs-only
        # push has no input, so fall back to the latest v* tag; if
        # the repo has no release tag yet, leave the dev sentinel
        # in place (empty SITE_VERSION skips the stamp). The input
        # is read through an env var, never interpolated into the
        # shell, so a crafted value cannot inject commands.
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          v="$INPUT_VERSION"
          if [ -z "$v" ]; then
            v="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          fi
          echo "SITE_VERSION=${v#v}" >> "$GITHUB_ENV"
      - name: Stamp release version into tracked manifests
        # Rewrites the version field in every tracked manifest
        # (incl. website/hugo.toml) from the dev sentinel to the
        # resolved version, so the deployed site shows it.
        if: env.SITE_VERSION != ''
        run: go run ./cmd/mdsmith-release stamp "$SITE_VERSION"
      - name: Pull published demo + benchmark numbers
        # The demo GIF and the cross-tool benchmark numbers are
        # regenerated post-merge and pushed to the orphan assets
        # branch (.github/workflows/{demo,benchmark}.yml), never
        # committed. Pull them in so the deployed site serves the
        # current GIF as a first-party asset and bakes the live
        # benchmark table into the comparison page. The committed
        # fragment snapshot is the fallback while the assets
        # branch has not published numbers yet; the
        # `bench-fragments` gate (a separate workflow) still
        # validates that committed snapshot. The scoped
        # `mdsmith fix` refreshes only the one page's <?include?>
        # body from the freshly pulled fragment — the intended,
        # minimal exception to build-website's --no-fix. See
        # docs/development/release-tooling.md for why the pull is
        # a Go subcommand rather than inline shell.
        run: |
          go run ./cmd/mdsmith-release pull-site-assets
          go run ./cmd/mdsmith fix docs/background/markdown-linters.md
      - name: Build Hugo content tree from docs
        # Snapshot ./docs into ./website/content/docs, dropping
        # proto.md schema templates, renaming index.md to
        # _index.md, pruning non-content files, and escaping
        # literal Hugo shortcode patterns. --no-fix because docs/
        # is already lint-clean on main (the check workflow gates
        # that); CI must not mutate the tree. See
        # docs/development/release-tooling.md for why this lives
        # in the release-tooling Go CLI rather than inline shell.
        run: go run ./cmd/mdsmith-release build-website --no-fix ./docs ./website/content/docs
      - name: Lint built docs tree for broken links
        # Run mdsmith over the synced tree with its own config
        # (style/structure rules off, link integrity on) so any
        # post-sync broken link or missing target fails CI before
        # we publish. --no-gitignore is needed because
        # website/content/docs/ is .gitignore'd. See
        # website/build-output.mdsmith.yml for the rule set and
        # the rationale for each disabled rule. Re-runs here as
        # defense-in-depth: build-content already ran the same
        # check, but deploy's own sync above happens AFTER the
        # version-stamp and `mdsmith fix
        # docs/background/markdown-linters.md` steps that mutate
        # the docs/ tree, so this pass is the only one that
        # covers the post-mutation result.
        run: |
          go run ./cmd/mdsmith check \
            --config ./website/build-output.mdsmith.yml \
            --no-gitignore \
            ./website/content/docs
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        id: pages
      - name: Build site
        working-directory: website
        env:
          HUGO_ENVIRONMENT: production
          # The base URL Pages assigns gets piped through a shell
          # env var rather than substituted into the run script
          # directly, so an attacker-controlled output cannot
          # inject shell metacharacters (zizmor finding 36 —
          # template-expansion vulnerability).
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: hugo --minify --baseURL "${BASE_URL}/"
      - name: Verify render-link hook output
        # The render-link hook
        # (website/layouts/_default/_markup/render-link.html) does
        # the source-relative → permalink resolution, baseURL
        # prefixing, and scheme sanitization. None of that is
        # visible to the synced-tree mdsmith check (it operates
        # on the markdown filesystem, pre-render). Probe the
        # rendered HTML for representative cases via a Go
        # subcommand so a regression breaks CI here rather than
        # silently shipping a site full of 404s. The probes
        # (and their regexes that tolerate both quoted and
        # minified href forms) live in
        # internal/release/verifylinks.go with unit-test
        # coverage rather than as inline YAML shell, per the
        # convention in docs/development/release-tooling.md.
        env:
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          go run ./cmd/mdsmith-release verify-website-links \
            --dir ./website/public --base-url "$BASE_URL"
      - name: Verify install picker matches channel docs
        # Re-run the picker probe here, like verify-website-links
        # above, so a regression introduced by this job's own
        # mutation steps (version stamp, mdsmith fix) cannot ship a
        # broken install picker to production. The commands it
        # checks are baseURL-independent, so the root render is
        # enough — no subpath re-probe needed.
        run: |
          go run ./cmd/mdsmith-release verify-install-picker \
            --dir ./website/public
      - name: Verify baseURL prefix on absolute hrefs
        # The rewriter emits site-absolute `/docs/...` URLs into
        # the synced markdown. The render-link hook runs them
        # through relURL so a non-root --baseURL deploy
        # (Pages served from a subpath) gets the configured
        # prefix. Build a second copy with a fake subpath
        # baseURL and re-run the same Go probe against it; the
        # subcommand uses the supplied baseURL's path component
        # as the expected prefix. The build output goes to a
        # throwaway destination so it does not displace the
        # real artifact.
        working-directory: website
        run: |
          hugo --minify --baseURL "https://example.com/mdsmith/" \
            --destination /tmp/baseurl-probe
          cd ..
          go run ./cmd/mdsmith-release verify-website-links \
            --dir /tmp/baseurl-probe \
            --base-url "https://example.com/mdsmith/"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/public
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
