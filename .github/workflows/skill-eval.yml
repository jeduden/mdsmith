name: skill eval

# Deterministic eval of the mdsmith-security-review skill, pinned to
# cases.yaml's baseline_ref. Runs the Go eval tests in strict mode: it
# validates cases.yaml, renders every fixture and checks the
# severity -> SARIF mapping, grades the goldens and rejects the
# complacent negative, and verifies regressions/build-exec.patch still
# applies AND compiles at baseline_ref. See internal/secreview and
# .claude/skills/mdsmith-security-review/evals.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  skill-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # baseline_ref must be present for the patch check
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          # tools/go.mod, not go.mod: TestSkillRegressionPatchAtBaseline
          # compiles a baseline_ref worktree whose go.mod may demand a
          # newer toolchain than HEAD's (HEAD dropped to go 1.25.0 when
          # dev tools moved to tools/go.mod), and setup-go pins
          # GOTOOLCHAIN=local, so no auto-switch can paper over the gap.
          # tools/go.mod carries the dev floor (>= 1.25.8), which
          # satisfies both checkouts.
          go-version-file: tools/go.mod
      - run: go test ./internal/secreview/... ./cmd/mdsmith-secreview/...
        env:
          SECREVIEW_STRICT: "1"
