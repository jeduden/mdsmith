name: Refresh benchmark numbers

# The committed cross-tool benchmark snapshot under
# docs/research/benchmarks/ is the source of truth the README, the
# benchmark doc, and the website all read from. Nothing in the
# normal PR -> CI -> merge flow refreshes it and there is no local
# run.sh step, so without this the snapshot freezes while the repo
# corpus keeps growing underneath it. This workflow is the actuator:
# it re-measures on the CI runner and opens a PR with the refreshed
# numbers. No button press is needed -- the monthly schedule fires
# it; the PR then goes through the same review-and-merge path as any
# other change (and the same bot mechanism as record-secret-rotation
# .yml). workflow_dispatch is there only for an on-demand refresh.
#
# It measures on ubuntu-latest -- the same runner class as the
# per-merge benchmark.yml drift signal -- so the committed numbers
# and that signal come from one environment. Absolute times wobble
# run-to-run on a shared runner, which is exactly why this lands a
# reviewable PR instead of committing to main automatically.

on:
  schedule:
    # 06:00 UTC on the 1st of each month. Frequent enough that the
    # repo-corpus growth never silently drifts the snapshot far,
    # rare enough that the review PR is not noise.
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Never run the scheduled job on a fork.
    if: github.repository == 'jeduden/mdsmith'
    timeout-minutes: 60
    # contents: write to push the refresh branch; pull-requests:
    # write for `gh pr create`. The change to main still goes
    # through the normal review-and-merge path -- this token only
    # opens the PR, it does not merge it.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Match the rest of the workflows: never persist the token
          # in git config. The push step authenticates explicitly via
          # a one-shot, masked header so the token never lives outside
          # that single command.
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # markdownlint-cli2 installs via `npm ci` from the committed
          # docs/research/benchmarks/npm/ lockfile.
          node-version: "24"
      - name: Re-measure the cross-tool benchmark
        # Builds mdsmith, fetches + SHA-256-verifies the pinned peer
        # binaries, `npm ci`s markdownlint-cli2, builds both corpora
        # (repo from git ls-files, neutral at the pinned commits),
        # drives hyperfine, promotes the JSON into
        # docs/research/benchmarks/data/, writes corpus_sizes.json,
        # and regenerates the fragments. Same Go entrypoint the local
        # run.sh wraps, so a hand-refresh and this job run identically.
        run: go run ./cmd/mdsmith-release bench /tmp/mdsmith-bench
      - name: Re-splice the fragment includes
        # `mdsmith fix` re-renders the <?include?> bodies that embed
        # the fragments -- the repo README and the benchmark doc -- so
        # the PR carries the rendered pages, not just the raw numbers.
        run: |
          go run ./cmd/mdsmith fix \
            docs/research/benchmarks/results.fragment.md \
            docs/research/benchmarks/headline.fragment.md
          go run ./cmd/mdsmith fix \
            README.md docs/research/benchmarks/README.md
      - name: Open a refresh PR if the numbers moved
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only the benchmark snapshot and the pages that embed
          # it. If the measurement happened to land byte-identical
          # there is nothing to do -- exit clean without an empty PR.
          git add docs/research/benchmarks/data \
                  docs/research/benchmarks/results.fragment.md \
                  docs/research/benchmarks/headline.fragment.md \
                  docs/research/benchmarks/README.md \
                  README.md
          if git diff --staged --quiet; then
            echo "::notice::benchmark numbers unchanged -- no PR opened"
            exit 0
          fi
          date=$(date -u +%Y-%m-%d)
          branch="bench/refresh-${date}-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git commit -m "bench: refresh cross-tool benchmark numbers ($date)"
          # Authenticate the push via a masked http.extraheader rather
          # than embedding the token in the remote URL, matching
          # record-secret-rotation.yml: GitHub Actions auto-masks the
          # literal token but not transformations of it, so register
          # the encoded header with ::add-mask:: before any step can
          # echo it.
          auth_header=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          echo "::add-mask::$auth_header"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:refs/heads/${branch}"
          body=$(cat <<'EOF'
          Automated refresh of the committed cross-tool benchmark snapshot,
          re-measured on the CI runner. Opened by `refresh-benchmark.yml`.

          Review it like any other PR: skim the number diff under
          `docs/research/benchmarks/data/` and the regenerated fragments. The
          absolute times wobble run-to-run on a shared runner, so sanity-check
          the per-run **ratios** (the stable signal) rather than the raw ms; if
          one tool clearly spiked from runner contention, just re-run the
          workflow. CI's `bench-fragments` gate verifies the fragments match
          the data before this can merge.
          EOF
          )
          gh pr create \
            --base main \
            --head "$branch" \
            --title "bench: refresh cross-tool benchmark numbers ($date)" \
            --body "$body"
