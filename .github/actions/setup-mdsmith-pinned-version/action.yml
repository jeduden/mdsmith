name: Setup pinned mdsmith binary
description: >-
  Install the pinned mdsmith release binary used as the compatibility baseline
  across CI and merge-queue workflows.

runs:
  using: composite
  steps:
    - shell: bash
      env:
        # Pinned compatibility baseline for mdsmith release checks and merge tooling.
        # Bump here only when intentionally updating that baseline.
        MDSMITH_VERSION: v0.29.0
        MDSMITH_SHA256: 130d784cec7fe096ba332974dcd615fc3b4a0ca479730c5fd5a3c9f1f1f55bd3
      # The binary is downloaded over HTTPS and SHA256-verified above
      # before $HOME/.local/bin is appended to PATH, so the github-env
      # write is safe to ignore.
      run: | # zizmor: ignore[github-env]
        set -euo pipefail
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://github.com/jeduden/mdsmith/releases/download/${MDSMITH_VERSION}/mdsmith-linux-amd64" \
          -o "$HOME/.local/bin/mdsmith"
        echo "${MDSMITH_SHA256}  $HOME/.local/bin/mdsmith" | sha256sum -c
        chmod +x "$HOME/.local/bin/mdsmith"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
