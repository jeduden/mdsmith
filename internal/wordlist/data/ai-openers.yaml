# Built-in "ai-openers" word-list: banned sentence openers.
#
# Source of truth: the "Sentence openers" section of
# .claude/skills/docs-author/slop-patterns.md. The drift-checker test
# (internal/integration/nollmtells_drift_test.go) fails CI if any entry
# here is no longer present in that catalog. Edit both together.
#
# Each entry keeps its trailing comma so MDS055
# (forbidden-paragraph-starts) anchors the prefix on the opener word,
# not a longer word that merely starts with the same letters. The
# no-llm-tells convention applies this list via
# `forbidden-paragraph-starts: {lists: [ai-openers]}`.
entries:
  - "Certainly,"
  - "Moreover,"
  - "Additionally,"
  - "Furthermore,"
  - "Indeed,"
  - "Notably,"
  - "Importantly,"
  - "Crucially,"
  - "Essentially,"
  - "Ultimately,"
  - "Fundamentally,"
  - "Basically,"
  - "In essence,"
  - "In conclusion,"
  - "To summarize,"
  - "To sum up,"
