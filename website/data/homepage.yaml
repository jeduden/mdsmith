hero:
  eyebrow: "Auto-fixing Markdown linter & formatter · Go"
  headline_pre: "Mark"
  headline_em: "down"
  headline_post: ", smithed."
  lead: >-
    Fast checks for style, readability, structure, and cross-file integrity.
    Auto-fix what fixes cleanly. Editor-grade diagnostics on every save.

# Feature cards are no longer listed here. They are driven by the
# shared Markdown in docs/features/ (synced to /docs/features/ by
# `mdsmith-release build-website`); the README includes the same
# source. See website/layouts/partials/feature-grid.html.

install:
  - id: go
    label: "go"
    prompt: "$"
    cmd: "go install"
    args: "github.com/jeduden/mdsmith/cmd/mdsmith@latest"
  - id: npm
    label: "npm"
    prompt: "$"
    cmd: "npm install -g"
    args: "@mdsmith/cli"
  - id: pip
    label: "pip"
    prompt: "$"
    cmd: "pip install"
    args: "mdsmith"
  - id: vscode
    label: "vs code"
    prompt: "$"
    cmd: "code --install-extension"
    args: "jeduden.mdsmith"
  - id: claude
    label: "claude code"
    prompt: "/"
    cmd: "plugin marketplace add"
    args: "jeduden/mdsmith"

# Public registries that ship the binary / extension. Rendered
# as links in the "Distributed via" strip — each points at the
# canonical package page so a reader lands on their channel.
channels:
  - name: "npm"
    url: "https://www.npmjs.com/package/@mdsmith/cli"
  - name: "PyPI"
    url: "https://pypi.org/project/mdsmith/"
  - name: "VS Code"
    url: "https://marketplace.visualstudio.com/items?itemName=jeduden.mdsmith"
  - name: "Open VSX"
    url: "https://open-vsx.org/extension/jeduden/mdsmith"
  - name: "GitHub Releases"
    url: "https://github.com/jeduden/mdsmith/releases"
