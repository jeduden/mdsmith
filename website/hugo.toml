baseURL = "https://mdsmith.dev/"
enableGitInfo = false
enableRobotsTXT = true
locale = "en-us"
title = "mdsmith"

[markup]

  [markup.goldmark]

    [markup.goldmark.renderer]
      unsafe = false

  [markup.highlight]
    noClasses = true
    style = "github-dark"

  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

[module]

  [[module.mounts]]
    excludeFiles = "docs/**"
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "content/docs"
    target = "content"

  [[module.mounts]]
    source = "static"
    target = "static"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "data"
    target = "data"

[outputs]
  home = ["HTML", "JSON"]
  page = ["HTML"]
  section = ["HTML"]

[params]
  description = "Write content; mdsmith keeps your Markdown neat and consistent — fast enough to stay out of your way. Auto-fix on save, instant navigation, cross-file integrity, and generated sections that keep a single source of truth in sync across files and pipelines."
  githubRepo = "jeduden/mdsmith"
  version = "0.0.0-dev"
