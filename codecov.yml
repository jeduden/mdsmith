coverage:
  status:
    project:
      # `default` is the strict (threshold: 0%) gate. Exclude
      # `.github/scripts/**` via `paths` so the introduction of
      # a new flag at lower coverage cannot tank this status —
      # codecov's `flags:` filter on a project status does NOT
      # remove the new flag's files from the project total, only
      # `paths:` does.
      default:
        target: auto
        threshold: 0%
        paths:
          - "!.github/scripts/**"
      # The `scripts` status is informational until a rolling
      # baseline accumulates on `main`. Flip `informational` off
      # to start enforcing once the baseline stabilizes.
      scripts:
        paths:
          - ".github/scripts/**"
        informational: true
    patch:
      default:
        target: auto
        threshold: 0%
        paths:
          - "!.github/scripts/**"
      scripts:
        paths:
          - ".github/scripts/**"
        informational: true
    # Per-file gate: fail the status check if any
    # file's coverage decreased vs the base commit. Scoped to
    # the same surface as `default` so adding the scripts flag
    # doesn't surface "decreased" on freshly-tracked files.
    changes:
      default:
        enabled: true
        target: auto
        threshold: 0%
        paths:
          - "!.github/scripts/**"

# Coverage is uploaded with a flag per language so each report
# only contains the files it actually measured. Without flags,
# Codecov treats unmeasured files (the entire other-language
# tree) as 0% coverage, which is misleading.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: go
      paths:
        - "**/*.go"
    - name: typescript
      paths:
        - "editors/vscode/src/**"
    - name: scripts
      paths:
        - ".github/scripts/**"

component_management:
  individual_components:
    - component_id: go
      name: Go
      paths:
        - "**/*.go"
    - component_id: typescript
      name: TypeScript
      paths:
        - "editors/vscode/src/**"
    - component_id: scripts
      name: CI Scripts
      paths:
        - ".github/scripts/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer, components"
  require_changes: true
