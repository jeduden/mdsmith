coverage:
  # Status gates are disabled while the rolling baseline on main
  # absorbs the new `.github/scripts/` surface. Coverage still
  # uploads under per-language flags so the UI (and the codecov
  # comment on PRs) keeps reporting numbers — just without a
  # blocking pass/fail check. `informational: true` would be the
  # documented way to do this; we are explicitly setting each
  # status to `false` instead because codecov has a long-standing
  # bug where `informational: true` on `default` still posts a
  # failure conclusion. Re-enable strict gates after a merge
  # that establishes a baseline including the scripts files.
  status:
    project: false
    patch: false
    changes: false

# Coverage is uploaded with a flag per language so each report
# only contains the files it actually measured. Without flags,
# Codecov treats unmeasured files (the entire other-language
# tree) as 0% coverage, which is misleading.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: go
      paths:
        - "**/*.go"
    - name: typescript
      paths:
        - "editors/vscode/src/**"
    - name: scripts
      paths:
        - ".github/scripts/**"

component_management:
  individual_components:
    - component_id: go
      name: Go
      paths:
        - "**/*.go"
    - component_id: typescript
      name: TypeScript
      paths:
        - "editors/vscode/src/**"
    - component_id: scripts
      name: CI Scripts
      paths:
        - ".github/scripts/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer, components"
  require_changes: true
