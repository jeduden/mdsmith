coverage:
  status:
    project:
      # `default` is the strict (threshold: 0%) gate. The
      # `informational` flag on the new `scripts` status keeps
      # the new flag's lower-coverage files from blocking the
      # PR while a rolling baseline accumulates on main. The
      # `default` status uses `informational: true` here too
      # because codecov's `flags:` and `paths:` filters on a
      # project status do not reliably restrict the project
      # total — they affect which files surface in the UI but
      # not which contribute to the strict comparison. Until
      # the baseline includes the scripts files we keep the
      # gate non-blocking; restore `informational: false` once
      # the trailing main coverage includes them.
      default:
        target: auto
        threshold: 0%
        informational: true
      scripts:
        flags:
          - scripts
        informational: true
    patch:
      default:
        target: auto
        threshold: 0%
        informational: true
      scripts:
        flags:
          - scripts
        informational: true
    changes:
      default:
        enabled: true
        target: auto
        threshold: 0%
        informational: true

# Coverage is uploaded with a flag per language so each report
# only contains the files it actually measured. Without flags,
# Codecov treats unmeasured files (the entire other-language
# tree) as 0% coverage, which is misleading.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: go
      paths:
        - "**/*.go"
    - name: typescript
      paths:
        - "editors/vscode/src/**"
    - name: scripts
      paths:
        - ".github/scripts/**"

component_management:
  individual_components:
    - component_id: go
      name: Go
      paths:
        - "**/*.go"
    - component_id: typescript
      name: TypeScript
      paths:
        - "editors/vscode/src/**"
    - component_id: scripts
      name: CI Scripts
      paths:
        - ".github/scripts/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer, components"
  require_changes: true
