front-matter: true

rules:
  line-length:
    max: 80
    exclude:
      - code-blocks
      - tables
      - urls
  heading-style:
    style: atx
  heading-increment: true
  first-line-heading:
    level: 1
  empty-section-body:
    min-level: 2
    max-level: 6
    allow-marker: allow-empty-section
  no-duplicate-headings: true
  no-trailing-spaces: true
  no-hard-tabs: true
  no-multiple-blanks:
    max: 1
  single-trailing-newline: true
  fenced-code-style:
    style: backtick
  fenced-code-language: true
  no-bare-urls: true
  blank-line-around-headings: true
  blank-line-around-lists: true
  blank-line-around-fenced-code: true
  list-indent:
    spaces: 2
  max-file-length:
    max: 300
  table-format:
    pad: 1
  catalog:
    pad: 1
  table-readability:
    max-column-width-ratio: 60
    max-columns: 8
    max-rows: 30
    max-words-per-cell: 30
  cross-file-reference-integrity:
    include: []
    exclude: []
    strict: true
  token-budget:
    max: 8000
    mode: heuristic
    tokens-per-word: 1.33
    tokenizer: builtin
    encoding: cl100k_base
  no-trailing-punctuation-in-heading: true
  no-emphasis-as-heading: true
  paragraph-readability:
    max-index: 14.0
    min-words: 20
  paragraph-structure:
    max-sentences: 6
    max-words-per-sentence: 40
  # Experimental rule: keep disabled until classifier-backed scoring is ready.
  conciseness-scoring: false
  directory-structure:
    allowed:
      - "."
      - "docs/**"
      - "plan/**"
      - "demo/**"
      - "internal/rules/**"
      - "internal/metrics/**"
      - "internal/concepts/**"
      - "internal/directives/**"
      - ".claude/**"
      - ".github/**"
      - "editors/**"
      - "npm/**"
      - "python/**"
      - "website/**"
  required-structure: true
  include: true
  unclosed-code-block: true
  git-hook-sync: true

overrides:
  - glob: ["CLAUDE.md"]
    rules:
      line-length:
        max: 200
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 400
      blank-line-around-lists: false
  - glob: [".claude/skills/*/SKILL.md",
            "editors/claude-code-*/skills/*/SKILL.md",
            ".github/copilot-pr-fixup.md",
            ".github/AGENTS-PR-FIXUP.md"]
    rules:
      max-file-length:
        max: 600
  - glob: [".claude/skills/*/SKILL.md",
            "editors/claude-code-*/skills/*/SKILL.md"]
    rules:
      # required-structure.schema for SKILL.md files comes
      # from the `skill` kind; this override only carries
      # the SKILL-specific heading-rule tweaks.
      first-line-heading: false
      heading-increment: false
  - glob: ["AGENTS.md", ".github/copilot-instructions.md"]
    rules:
      line-length:
        max: 200
        exclude:
          - code-blocks
          - tables
          - urls
      blank-line-around-lists: false
      blank-line-around-headings: false
      max-file-length:
        max: 600
      first-line-heading:
        level: 1
      cross-file-reference-integrity: true
      catalog: false
  # Synced website/content/docs/ mirror — gitignored, so the
  # recursive `mdsmith check .` walk skips it, but pointing
  # mdsmith at one of these files directly should still apply
  # the same overrides as the source docs/ tree. Each docs/**
  # override below carries the matching website/content/docs/**
  # glob in the same entry so the kinds + rules stay in lockstep
  # without a second config to drift.
  - glob: ["docs/development/index.md",
           "website/content/docs/development/_index.md"]
    rules:
      first-line-heading: false
      heading-increment: false
  - glob: ["internal/rules/index.md"]
    rules:
      table-readability:
        max-rows: 45
  - glob: ["README.md", "website/README.md"]
    rules:
      line-length:
        max: 100
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 350
      table-readability:
        max-rows: 40
      paragraph-structure:
        max-sentences: 30
  - glob: ["README.md"]
    rules:
      # The top-level H1 is intentionally dropped — the centered
      # logo lockup is the title — so the file's first heading is
      # the features <?include?> body, pinned to level 2. Same
      # opt-out the other include/template-driven files above use.
      first-line-heading: false
  - glob: ["PLAN.md"]
    rules:
      table-readability:
        max-rows: 80
        max-column-width-ratio: 65
  - glob: ["internal/rules/MDS002-heading-style/good/setext.md"]
    rules:
      heading-style:
        style: setext
  - glob: ["internal/rules/MDS010-fenced-code-style/good/tilde.md"]
    rules:
      fenced-code-style:
        style: tilde
  - glob: ["internal/rules/MDS016-list-indent/good/spaces-4.md"]
    rules:
      list-indent:
        spaces: 4
  - glob: ["docs/background/**/*.md",
           "website/content/docs/background/**/*.md"]
    rules:
      line-length:
        stern: true
      # Background docs are long-form reference (the linter
      # comparison + matrices). Raised 1000 -> 3000 by owner
      # request so the comparison doc has room; the matrix
      # itself lives in docs/research/ to keep this in check.
      max-file-length:
        max: 3000
      token-budget:
        max: 12000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
  - glob: ["docs/development/pr-fixup-workflow.md",
           "website/content/docs/development/pr-fixup-workflow.md"]
    rules:
      first-line-heading: false
      heading-increment: false
      max-file-length:
        max: 330
  - glob: ["docs/development/release.md",
           "website/content/docs/development/release.md"]
    rules:
      max-file-length:
        max: 380
  - glob: ["docs/guides/**/*.md",
           "website/content/docs/guides/**/*.md"]
    rules:
      line-length:
        max: 600
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 600
      token-budget:
        max: 12000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
      paragraph-readability:
        max-index: 24.0
        min-words: 20
      paragraph-structure:
        max-sentences: 12
        max-words-per-sentence: 120
  - glob: ["docs/security/*.md", "!docs/security/proto.md",
           "website/content/docs/security/*.md"]
    rules:
      line-length:
        max: 600
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 1000
      paragraph-readability: false
      paragraph-structure: false
      no-emphasis-as-heading: false
      token-budget:
        max: 16000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
  - glob: ["editors/claude-code/**/*.md"]
    rules:
      line-length:
        max: 72
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 80
      paragraph-structure:
        max-sentences: 3
        max-words-per-sentence: 25
      paragraph-readability:
        max-index: 12.0
        min-words: 20
      token-budget:
        max: 2000
        mode: heuristic
        tokens-per-word: 1.33
        tokenizer: builtin
        encoding: cl100k_base
  - glob: ["docs/research/**",
           "website/content/docs/research/**"]
    rules:
      first-line-heading: false
      heading-increment: false
      paragraph-readability: false
      paragraph-structure: false
      token-budget: false
      max-file-length: false
      cross-file-reference-integrity: false
      required-structure: false
  - glob: ["docs/brand/**"]
    # Brand prose: docs/brand/messaging.md is the canonical
    # product copy (the lead, tagline, and per-surface
    # descriptions follow marketing rhythm, not the docs
    # readability budget). Generated fragments under
    # docs/brand/fragments/ are bare prose snippets consumed
    # verbatim by <?include?> in README intros — no H1 of
    # their own. Both shapes opt out of the structural rules
    # that target docs prose; same pattern as the existing
    # docs/research/** override.
    rules:
      paragraph-readability: false
      paragraph-structure: false
  - glob: ["docs/brand/fragments/**"]
    # Fragments alone (not the canonical messaging.md) also
    # disable the heading rules — they have no H1 and live
    # inside <?include?> blocks where the H1 rule does not
    # apply to the embed root.
    rules:
      first-line-heading: false
      heading-increment: false

ignore:
  - ".git/**"
  - "demo/**"
  - "internal/rules/*/bad/**"
  - "internal/rules/*/bad.md"
  - "internal/rules/*/good/**"
  - "internal/rules/*/fixed/**"
  - "internal/rules/*/pattern/**"
  - ".claude/worktrees/**"
  - "editors/**/node_modules/**"
  - "editors/**/dist/**"

kinds:
  free-body:
    # Shared schema skeleton for doc kinds whose body is
    # free-form prose: a preamble followed by any headings.
    # Each consumer sets only its own `frontmatter:` and
    # reuses this section shape plus `closed: false` via
    # `extends:`, removing the duplication these kinds used
    # to each carry.
    schema:
      closed: false
      sections:
        - heading: null
        - heading:
            regex: '.+'
            repeat: { min: 0 }
  proto:
    rules:
      # proto.md files lead with directives and placeholder
      # headings rather than a content level-1 heading; the
      # opt-in placeholder vocabulary cannot rewrite that
      # structure, so the structural heading rules step aside
      # for this kind.
      first-line-heading: false
      heading-increment: false
      blank-line-around-headings: false
      no-emphasis-as-heading: false
      # Links in proto.md bodies are placeholder text
      # (e.g. `NAME`, not `{name}`) — they aren't real
      # repo paths and var-token cannot match them.
      cross-file-reference-integrity: false
      paragraph-readability: false
      paragraph-structure: false
  plan:
    path-pattern: "plan/{proto.md,[0-9][0-9]*_*.md}"
    rules:
      required-structure:
        schema: plan/proto.md
  rule-readme:
    path-pattern: "internal/rules/{proto.md,MDS[0-9]*-*/README.md}"
    rules:
      required-structure:
        schema: internal/rules/proto.md
      no-inline-html:
        allow: [kbd]
  directive-rule-readme:
    # Inherits rule-readme's structure (frontmatter + sections)
    # and tightens it via the directive-proto.md schema, which
    # adds the required Pattern section. `extends:` removes the
    # duplication the kind used to carry.
    extends: rule-readme
    rules:
      required-structure:
        schema: internal/rules/directive-proto.md
  skill:
    path-pattern: "{.claude/skills,editors/claude-code-*/skills}/{proto.md,*/SKILL.md}"
    rules:
      required-structure:
        schema: .claude/skills/proto.md
  security-note:
    path-pattern: "docs/security/{proto.md,[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md}"
    rules:
      required-structure:
        schema: docs/security/proto.md
  architecture-doc:
    extends: free-body
    schema:
      frontmatter:
        title: nonEmpty
        slug: nonEmpty
        summary: nonEmpty
    rules:
      max-file-length:
        max: 500
  cli-command:
    extends: free-body
    schema:
      frontmatter:
        command: nonEmpty
        summary: nonEmpty
  release-channel:
    path-pattern: "{docs,website/content/docs}/development/release-channels/{proto.md,*.md}"
    rules:
      required-structure:
        schema: docs/development/release-channels/proto.md
  secret-rotation:
    extends: free-body
    schema:
      frontmatter:
        title: nonEmpty
        summary: nonEmpty
        lastRotated: date
        periodDays: 'int & > 0'
        provider: nonEmpty
        issuerUrl: url
        usedBy: nonEmpty
        scope: nonEmpty
        releaseEnvScoped: bool
  audit-log:
    extends: free-body
    schema:
      frontmatter:
        title: nonEmpty
        "summary?": string
        audit-from: '=~"^[0-9a-f]{7,40}$"'
      filename: "architecture-audit.md"
  feature:
    # Marketing feature pages under docs/features/. The homepage
    # feature grid (website/layouts/partials/feature-grid.html)
    # and the README <?include?> both depend on this front
    # matter, so the schema makes a missing/typo'd field fail
    # `mdsmith check` instead of silently breaking a card.
    extends: free-body
    schema:
      frontmatter:
        title: nonEmpty
        summary: nonEmpty
        icon: nonEmpty
        weight: 'int & >=1'
        # group: which pillar a card belongs to. The homepage groups
        # the grid by it (see feature-grid.html), rendering one heading
        # per distinct value it finds, so a typo or an unknown group
        # would surface as a stray extra heading. Pin it to the five
        # pillar names below so a bad value fails `mdsmith check`
        # instead.
        group: '"Clean, consistent Markdown" | "One engine, every surface" | "A connected docs tree" | "Markdown as a single source of truth" | "Built for your pipeline"'
        "link?": string
        "rules?": '[...string]'
  feature-index:
    # docs/features/index.md is the shared "Why mdsmith"
    # overview, not a card: it carries only title + summary
    # (no icon/weight), so it gets its own kind.
    extends: free-body
    schema:
      frontmatter:
        title: nonEmpty
        summary: nonEmpty
  messaging:
    # docs/brand/messaging.md is the single source of truth
    # for the product slogan, lead, tagline, and per-surface
    # descriptions. The fields are projected via
    # `mdsmith extract messaging docs/brand/messaging.md` and
    # the `mdsmith-release sync-messaging` subcommand reads
    # the JSON to regenerate fragment files and patch the
    # JSON / TOML / YAML-frontmatter surfaces enumerated in
    # plan 210. Every field is required so a typo or omission
    # fails `mdsmith check` instead of silently breaking a
    # surface on the next sync.
    #
    # No path-pattern: kind-assignment below also assigns
    # this kind to the synced website parallel
    # (website/content/docs/brand/messaging.md), and a kind
    # whose path-pattern omitted the website path would
    # trigger MDS020 once that file materialises.
    schema:
      frontmatter:
        title: nonEmpty
        summary: nonEmpty
      closed: false
      sections:
        - heading: null
        - heading: { regex: '^Headline$' }
          content:
            - { kind: paragraph, projection: inline, required: true }
        - heading: { regex: '^Eyebrow$' }
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^Lead$' }
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^Tagline$' }
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^VS Code$' }
          bind: vscode-description
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^VS Code overview$' }
          bind: vscode-overview
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^Claude Code LSP$' }
          bind: claude-code-lsp-description
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^Claude Code skills$' }
          bind: claude-code-skills-description
          content:
            - { kind: paragraph, required: true }
        - heading: { regex: '^Claude Code audit$' }
          bind: claude-code-audit-description
          content:
            - { kind: paragraph, required: true }
  website-page:
    # Hugo content pages under website/content/. Scoped to the
    # top level only (no **) so the kind covers hand-authored
    # marketing pages but does not match files under
    # website/content/docs/, which are gitignored snapshots of
    # the source docs/ tree produced by sync-docs and already
    # carry their own kinds via the docs/-tree overrides.
    # Most pages here are template-driven (hero, feature grid,
    # install tabs) with data in front-matter rather than
    # markdown body — so the body-heading and increment rules
    # step aside. The schema requires the same front-matter
    # pair (title + summary) used by mdsmith's catalog rows so
    # the same content can be indexed by either Hugo or
    # `<?catalog?>`.
    path-pattern: "website/content/*.md"
    extends: free-body
    schema:
      frontmatter:
        title: nonEmpty
        summary: nonEmpty
        # The homepage carries its hero copy and install
        # quickstart in its own front matter (read by
        # hero.html / install-list.html) instead of a
        # separate data file. Open structs: Hugo templates
        # consume the specific keys.
        "hero?": '{...}'
        "install?": '[...{...}]'
    rules:
      first-line-heading: false
      heading-increment: false
      cross-file-reference-integrity: false
      paragraph-readability: false
      paragraph-structure: false
      line-length:
        max: 200
        exclude:
          - code-blocks
          - tables
          - urls
      max-file-length:
        max: 500

# kind-assignment order matters: the proto kind applies
# first so each proto.md also picks up its project kind,
# whose required-structure.schema points back at the file
# itself. That marks proto.md as its own schema,
# suppressing the "<?require?> outside a schema" warning
# and skipping structural self-validation.
#
# Each project kind matches its directory's *.md files
# (so proto.md is included and inherits the schema). The
# proto kind disables structural rules on proto.md;
# project-kind/override settings deep-merge over that.
#
# See docs/reference/globs.md for glob and exclusion
# semantics — note that "!"-exclusion in kind-assignment
# would strip the schema from proto.md, so it is not used
# here.
kind-assignment:
  - glob: ["**/proto.md"]
    kinds: [proto]
  - glob: ["plan/*.md"]
    kinds: [plan]
  - glob: ["internal/rules/proto.md",
           "internal/rules/MDS*/README.md",
           "!internal/rules/MDS019-catalog/README.md",
           "!internal/rules/MDS021-include/README.md",
           "!internal/rules/MDS038-toc/README.md",
           "!internal/rules/MDS039-build/README.md"]
    kinds: [rule-readme]
  # The four directive rule READMEs need a stricter schema
  # that requires a Pattern section. Until kind-schema
  # composition lands (plan/156), the directive-rule-readme
  # schema duplicates rule-readme's structure and adds the
  # Pattern requirement, and the four READMEs are excluded
  # from the rule-readme glob above so only one schema
  # resolves per file.
  - glob: ["internal/rules/MDS019-catalog/README.md",
           "internal/rules/MDS021-include/README.md",
           "internal/rules/MDS038-toc/README.md",
           "internal/rules/MDS039-build/README.md"]
    kinds: [directive-rule-readme]
  - glob: [".claude/skills/proto.md", ".claude/skills/*/SKILL.md",
            "editors/claude-code-*/skills/*/SKILL.md"]
    kinds: [skill]
  # Each docs/**-targeting assignment also matches the synced
  # website/content/docs/** parallel path so an explicit lint
  # against a synced file resolves to the same kind as the
  # source. The recursive walk still skips these because the
  # output directory is gitignored.
  - glob: ["docs/security/*.md",
           "website/content/docs/security/*.md"]
    kinds: [security-note]
  - glob: ["docs/development/secret-rotations/*.md",
           "website/content/docs/development/secret-rotations/*.md"]
    kinds: [secret-rotation]
  - glob: ["docs/reference/cli/*.md",
           "website/content/docs/reference/cli/*.md"]
    kinds: [cli-command]
  - glob: ["docs/development/release-channels/*.md",
           "website/content/docs/development/release-channels/*.md"]
    kinds: [release-channel]
  - glob: ["docs/development/architecture/*.md",
           "website/content/docs/development/architecture/*.md"]
    kinds: [architecture-doc]
  - glob: ["docs/development/architecture-audit.md",
           "website/content/docs/development/architecture-audit.md"]
    kinds: [audit-log]
  - glob: ["docs/features/index.md",
           "website/content/docs/features/_index.md"]
    kinds: [feature-index]
  - glob: ["docs/brand/messaging.md",
           "website/content/docs/brand/messaging.md"]
    kinds: [messaging]
  - glob: ["docs/features/*.md",
           "!docs/features/index.md",
           "website/content/docs/features/*.md",
           "!website/content/docs/features/_index.md"]
    kinds: [feature]
  - glob: ["website/content/*.md"]
    kinds: [website-page]
